<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="売上ノート">
<meta name="theme-color" content="#C8603A">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<title>売上ノート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f2ee;--card:#fff;--line:#e6ded7;--line2:#d8cec5;--text:#2b2420;--muted:#82766c;--soft:#aaa097;--accent:#d9714e;--accent2:#c8603a;--accent-bg:#fff0ea;--sky:#4a82b0;--sky-bg:#eaf2f8;--sage:#5a8a72;--sage-bg:#eaf3ee;--amber:#c9882a;--amber-bg:#fdf4e4;--rose:#c05070;--rose-bg:#fceef3;--r:18px;--rs:13px;--sh:0 6px 22px rgba(75,54,40,.10)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html{background:var(--bg)}body{font-family:'Noto Sans JP',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100svh;font-size:16px;padding-bottom:calc(28px + env(safe-area-inset-bottom))}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{max-width:520px;margin:0 auto;padding:12px 14px 28px}.top{position:sticky;top:0;z-index:20;background:rgba(246,242,238,.92);backdrop-filter:blur(14px);padding:calc(10px + env(safe-area-inset-top)) 14px 12px;margin:0 -14px 10px;border-bottom:1px solid rgba(230,222,215,.8)}.brand{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand-left{display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:13px;background:url('./apple-touch-icon.png') center/cover no-repeat;box-shadow:0 4px 12px rgba(217,113,78,.30)}.title{line-height:1.1}.title b{display:block;font-size:21px;font-weight:800;letter-spacing:-.03em}.title span{font-size:12px;color:var(--soft);font-weight:600}.month{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--line);border-radius:999px;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,.04)}.month button{width:31px;height:31px;border:0;background:transparent;border-radius:50%;font-size:22px;color:var(--muted);line-height:1}.month-label{min-width:88px;text-align:center;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px}.hero{background:linear-gradient(135deg,#df7b58,#c8603a);border-radius:24px;padding:20px 18px;color:#fff;box-shadow:0 12px 28px rgba(200,96,58,.24);margin-bottom:14px}.hero-label{font-size:13px;opacity:.82;font-weight:700}.hero-amount{font-family:'Nunito',sans-serif;font-size:42px;font-weight:800;letter-spacing:-.04em;line-height:1.05;margin-top:8px}.hero-sub{display:flex;justify-content:space-between;gap:10px;margin-top:13px;font-size:13px;opacity:.9}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}.stat{background:var(--card);border:1.5px solid var(--line);border-radius:17px;padding:12px 10px;box-shadow:0 3px 12px rgba(0,0,0,.04)}.stat .lab{font-size:11px;font-weight:700;color:var(--muted);line-height:1.25}.stat .val{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;margin-top:6px;letter-spacing:-.02em}.stat .num{font-size:11px;color:var(--soft);margin-top:2px}.section{background:var(--card);border:1.5px solid var(--line);border-radius:22px;box-shadow:var(--sh);overflow:hidden;margin-bottom:14px}.sec-head{display:flex;align-items:center;justify-content:space-between;padding:16px 16px;border-bottom:1.5px solid var(--line)}.sec-title{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:800}.sec-ico{width:32px;height:32px;border-radius:10px;background:var(--accent-bg);display:grid;place-items:center;color:var(--accent);font-size:22px}.badge{background:#f0ece7;color:var(--muted);border-radius:999px;padding:4px 10px;font-size:13px;font-weight:800}.form{padding:16px}.fg{margin-bottom:13px}.fg label{display:block;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:6px}.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid var(--line2);background:#fbfaf8;border-radius:14px;padding:14px 13px;font-size:16px;color:var(--text);outline:none}.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(217,113,78,.13);background:#fff}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.add{width:100%;height:52px;border:0;border-radius:15px;background:var(--accent);color:#fff;font-weight:800;font-size:16px;box-shadow:0 7px 16px rgba(217,113,78,.30)}.hint{font-size:12px;color:var(--soft);line-height:1.5;margin-top:10px}.list{padding:12px}.job{border:1.5px solid var(--line);border-radius:18px;background:#fff;padding:14px;margin-bottom:10px;box-shadow:0 2px 9px rgba(0,0,0,.035)}.job:last-child{margin-bottom:0}.job-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.job-name{font-weight:800;font-size:16px;line-height:1.35}.job-memo{font-size:12px;color:var(--soft);margin-top:4px;line-height:1.4}.job-amt{font-family:'Nunito',sans-serif;font-weight:800;font-size:22px;white-space:nowrap}.job-meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.pill{font-size:12px;font-weight:800;border-radius:999px;padding:5px 9px}.type-yt{background:#fff0ec;color:#b84c25}.type-reels{background:#eef3ff;color:#3a52c4}.type-other{background:#f0ece7;color:var(--muted)}.status-none{background:var(--rose-bg);color:var(--rose)}.status-inv{background:var(--sky-bg);color:var(--sky)}.status-sent{background:var(--sage-bg);color:var(--sage)}.status-paid{background:var(--amber-bg);color:var(--amber)}.checks{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:13px}.checkbtn{position:relative}.checkbtn input{position:absolute;opacity:0;inset:0}.checkbtn span{height:42px;border:1.5px solid var(--line2);border-radius:13px;background:#fbfaf8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--muted)}.checkbtn input:checked+span{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}.actions{display:flex;gap:8px;margin-top:12px}.mini{flex:1;height:40px;border:1.5px solid var(--line);background:#fbfaf8;border-radius:12px;color:var(--muted);font-weight:800}.mini.del{color:var(--rose);background:var(--rose-bg);border-color:#f1c8d4}.empty{padding:46px 18px;text-align:center;color:var(--soft)}.empty-icon{width:62px;height:62px;border-radius:50%;background:#eee9e3;margin:0 auto 14px;display:grid;place-items:center;font-size:28px;color:#aaa}.empty b{display:block;color:var(--muted);font-size:16px;margin-bottom:5px}.empty span{font-size:13px}.total{padding:14px 16px;border-top:1.5px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:#fbfaf8}.total span{font-weight:700;color:var(--muted)}.total b{font-family:'Nunito',sans-serif;font-size:22px;font-weight:800}.overlay{position:fixed;inset:0;background:rgba(35,24,18,.48);z-index:50;display:none;align-items:flex-end;padding:14px;backdrop-filter:blur(4px)}.overlay.open{display:flex}.modal{width:100%;max-width:520px;margin:0 auto;background:#fff;border-radius:24px;padding:18px;box-shadow:0 -8px 32px rgba(0,0,0,.18)}.modal h3{font-size:19px;margin-bottom:4px}.modal p{font-size:13px;color:var(--soft);margin-bottom:15px}.modal-btns{display:flex;gap:9px;margin-top:14px}.mbtn{flex:1;height:48px;border:0;border-radius:14px;font-weight:800}.cancel{background:#f0ece7;color:var(--muted)}.save{background:var(--accent);color:#fff}.danger{background:var(--rose);color:#fff}@media(min-width:700px){.app{max-width:560px}.top{border-radius:0 0 24px 24px}.hero-amount{font-size:46px}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <div class="brand-left"><div class="logo"></div><div class="title"><b>売上ノート</b><span>Studio S</span></div></div>
      <div class="month"><button id="prevM">‹</button><div class="month-label" id="monthLabel">2026年5月</div><button id="nextM">›</button></div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-label">今月の売上</div>
    <div class="hero-amount" id="cTotal">¥0</div>
    <div class="hero-sub"><span id="cCount">0件</span><span id="paidRate">入金確認 0%</span></div>
  </section>

  <section class="stats">
    <div class="stat"><div class="lab">請求書<br>作成済み</div><div class="val" id="cInv">¥0</div><div class="num" id="rInv">0 / 0件</div></div>
    <div class="stat"><div class="lab">送付<br>済み</div><div class="val" id="cSent">¥0</div><div class="num" id="rSent">0 / 0件</div></div>
    <div class="stat"><div class="lab">入金<br>確認済み</div><div class="val" id="cPaid">¥0</div><div class="num" id="rPaid">0 / 0件</div></div>
  </section>

  <section class="section">
    <div class="sec-head"><div class="sec-title"><div class="sec-ico">＋</div>案件を追加</div></div>
    <div class="form">
      <div class="fg"><label>案件名 / クライアント名</label><input type="text" id="iName" placeholder="例）田中コーチ YouTube編集"></div>
      <div class="grid2"><div class="fg"><label>種別</label><select id="iType"><option value="YouTube">YouTube</option><option value="Reels">Reels / ショート</option><option value="その他">その他</option></select></div><div class="fg"><label>本数</label><input type="number" id="iQty" value="1" min="1"></div></div>
      <div class="fg"><label>単価（円）</label><input type="number" id="iPrice" placeholder="28000" min="0" inputmode="numeric"></div>
      <div class="fg"><label>メモ（任意）</label><input type="text" id="iMemo" placeholder="例）月末締め 翌月払い"></div>
      <button class="add" id="btnAdd">＋ 追加する</button>
      <div class="hint">追加後に、請求書作成・送付・入金確認をカード上で管理できます。</div>
    </div>
  </section>

  <section class="section">
    <div class="sec-head"><div class="sec-title"><div class="sec-ico" style="background:#f0ece7;color:var(--muted);font-size:18px">▦</div>案件一覧</div><div class="badge" id="countBadge">0件</div></div>
    <div class="list" id="list"></div>
    <div id="emptyState" class="empty"><div class="empty-icon">□</div><b>まだ案件がありません</b><span>上のフォームから追加してみましょう</span></div>
    <div class="total" id="totalRow" style="display:none"><span>合計</span><b id="totalAmt">¥0</b></div>
  </section>
</div>

<div class="overlay" id="editOverlay"><div class="modal"><h3>案件を編集</h3><p>内容を変更して保存してください。</p><div class="fg"><label>案件名</label><input type="text" id="eName"></div><div class="grid2"><div class="fg"><label>種別</label><select id="eType"><option value="YouTube">YouTube</option><option value="Reels">Reels / ショート</option><option value="その他">その他</option></select></div><div class="fg"><label>本数</label><input type="number" id="eQty" min="1"></div></div><div class="fg"><label>単価（円）</label><input type="number" id="ePrice" min="0" inputmode="numeric"></div><div class="fg"><label>メモ</label><textarea id="eMemo" rows="2"></textarea></div><div class="modal-btns"><button class="mbtn cancel" id="editCancel">キャンセル</button><button class="mbtn save" id="editSave">保存</button></div></div></div>
<div class="overlay" id="delOverlay"><div class="modal"><h3>削除しますか？</h3><p id="delName">この案件を削除すると元に戻せません。</p><div class="modal-btns"><button class="mbtn cancel" id="delCancel">キャンセル</button><button class="mbtn danger" id="delOk">削除する</button></div></div></div>

<script>
const KEY = 'studioS_sales_note_v5';
const IDB_NAME = 'StudioSSalesNoteDB';
const IDB_STORE = 'kv';
let cur = new Date();
let db = {};
let editIdx = -1, delIdx = -1;
let ready = false;
const $ = id => document.getElementById(id);

function openIDB(){
  return new Promise((resolve)=>{
    if(!('indexedDB' in window)){ resolve(null); return; }
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => {
      const d = req.result;
      if(!d.objectStoreNames.contains(IDB_STORE)) d.createObjectStore(IDB_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(null);
  });
}
async function idbGet(key){
  const d = await openIDB(); if(!d) return null;
  return new Promise((resolve)=>{
    const tx = d.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => resolve(null);
  });
}
async function idbSet(key, value){
  const d = await openIDB(); if(!d) return;
  return new Promise((resolve)=>{
    const tx = d.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => resolve();
  });
}
function safeParse(v){ try { return v ? JSON.parse(v) : null; } catch(e){ return null; } }
function isEmptyObj(o){ return !o || Object.keys(o).length === 0; }
async function loadDB(){
  const fromLocal = safeParse(localStorage.getItem(KEY)) || safeParse(localStorage.getItem('studioS_v4')) || {};
  const fromIDB = safeParse(await idbGet(KEY)) || {};
  db = !isEmptyObj(fromIDB) ? fromIDB : fromLocal;
  // 旧キーから読めた場合も新キーへ移行
  persist();
  ready = true;
  render();
}
function persist(){
  const data = JSON.stringify(db);
  try { localStorage.setItem(KEY, data); } catch(e) {}
  idbSet(KEY, data);
}
function mkey(){ return `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`; }
function rows(){ if(!db[mkey()]) db[mkey()] = []; return db[mkey()]; }
function save(){ persist(); }
function yen(n){ return '¥' + Math.round(n).toLocaleString('ja-JP'); }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function render(){
  if(!ready) return;
  const y=cur.getFullYear(), m=cur.getMonth()+1;
  $('monthLabel').textContent=`${y}年${m}月`;
  const items=rows(), list=$('list');
  $('emptyState').style.display=items.length?'none':'block';
  $('totalRow').style.display=items.length?'flex':'none';
  list.style.display=items.length?'block':'none';
  list.innerHTML=items.map((it,i)=>{
    const sub=it.price*it.qty;
    const tc=it.type==='YouTube'?'type-yt':it.type==='Reels'?'type-reels':'type-other';
    let sc='status-none', st='未対応';
    if(it.paid){sc='status-paid';st='入金済み'} else if(it.sent){sc='status-sent';st='送付済み'} else if(it.invoiced){sc='status-inv';st='作成済み'}
    return `<article class="job"><div class="job-top"><div><div class="job-name">${esc(it.name)}</div>${it.memo?`<div class="job-memo">${esc(it.memo)}</div>`:''}</div><div class="job-amt">${yen(sub)}</div></div><div class="job-meta"><span class="pill ${tc}">${esc(it.type)}</span><span class="pill">単価 ${yen(it.price)}</span><span class="pill">${it.qty}本</span><span class="pill ${sc}">${st}</span></div><div class="checks"><label class="checkbtn"><input type="checkbox" ${it.invoiced?'checked':''} onchange="chk(${i},'invoiced',this.checked)"><span>請求書</span></label><label class="checkbtn"><input type="checkbox" ${it.sent?'checked':''} onchange="chk(${i},'sent',this.checked)"><span>送付</span></label><label class="checkbtn"><input type="checkbox" ${it.paid?'checked':''} onchange="chk(${i},'paid',this.checked)"><span>入金</span></label></div><div class="actions"><button class="mini" onclick="openEdit(${i})">編集</button><button class="mini del" onclick="openDel(${i})">削除</button></div></article>`
  }).join('');
  const total=items.reduce((s,x)=>s+x.price*x.qty,0), inv=items.filter(x=>x.invoiced), sent=items.filter(x=>x.sent), paid=items.filter(x=>x.paid);
  $('cTotal').textContent=yen(total); $('cCount').textContent=`${items.length}件`;
  $('cInv').textContent=yen(inv.reduce((s,x)=>s+x.price*x.qty,0));
  $('cSent').textContent=yen(sent.reduce((s,x)=>s+x.price*x.qty,0));
  $('cPaid').textContent=yen(paid.reduce((s,x)=>s+x.price*x.qty,0));
  $('countBadge').textContent=`${items.length}件`; $('totalAmt').textContent=yen(total);
  $('rInv').textContent=`${inv.length} / ${items.length}件`; $('rSent').textContent=`${sent.length} / ${items.length}件`; $('rPaid').textContent=`${paid.length} / ${items.length}件`;
  $('paidRate').textContent=`入金確認 ${items.length?Math.round(paid.length/items.length*100):0}%`;
}
function chk(i,field,val){
  const r=rows()[i]; if(!r) return;
  r[field]=val;
  if(field==='paid'&&val){r.sent=true;r.invoiced=true}
  if(field==='sent'&&val) r.invoiced=true;
  if(field==='sent'&&!val) r.paid=false;
  if(field==='invoiced'&&!val){r.sent=false;r.paid=false}
  save(); render();
}
$('btnAdd').addEventListener('click',()=>{
  const name=$('iName').value.trim(), price=parseInt($('iPrice').value)||0, qty=Math.max(1,parseInt($('iQty').value)||1);
  if(!name){$('iName').focus();return}
  if(!price){$('iPrice').focus();return}
  rows().push({id:Date.now(),name,type:$('iType').value,price,qty,memo:$('iMemo').value.trim(),invoiced:false,sent:false,paid:false});
  save(); render();
  $('iName').value=''; $('iPrice').value=''; $('iQty').value='1'; $('iMemo').value='';
});
['iName','iPrice','iQty','iMemo'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter')$('btnAdd').click()}));
function openEdit(i){ editIdx=i; const it=rows()[i]; $('eName').value=it.name; $('eType').value=it.type; $('ePrice').value=it.price; $('eQty').value=it.qty; $('eMemo').value=it.memo||''; $('editOverlay').classList.add('open'); }
function openDel(i){ delIdx=i; $('delName').textContent=`「${rows()[i].name}」を削除すると元に戻せません。`; $('delOverlay').classList.add('open'); }
$('editCancel').onclick=()=>$('editOverlay').classList.remove('open');
$('editOverlay').addEventListener('click',e=>{if(e.target===$('editOverlay'))$('editOverlay').classList.remove('open')});
$('editSave').onclick=()=>{ const name=$('eName').value.trim(), price=parseInt($('ePrice').value)||0; if(!name||!price)return; const it=rows()[editIdx]; it.name=name; it.type=$('eType').value; it.price=price; it.qty=Math.max(1,parseInt($('eQty').value)||1); it.memo=$('eMemo').value.trim(); save(); render(); $('editOverlay').classList.remove('open'); };
$('delCancel').onclick=()=>$('delOverlay').classList.remove('open');
$('delOverlay').addEventListener('click',e=>{if(e.target===$('delOverlay'))$('delOverlay').classList.remove('open')});
$('delOk').onclick=()=>{ rows().splice(delIdx,1); save(); render(); $('delOverlay').classList.remove('open'); };
$('prevM').onclick=()=>{cur=new Date(cur.getFullYear(),cur.getMonth()-1,1);render()};
$('nextM').onclick=()=>{cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);render()};
window.addEventListener('pagehide', save);
window.addEventListener('beforeunload', save);
loadDB();
</script>
</body>
</html>
